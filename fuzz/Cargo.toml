[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
mado-download = { path = "../crates/download" }
mado-java-runtime = { path = "../crates/java-runtime" }
serde_json = "1"

[[bin]]
name = "icon_name"
path = "fuzz_targets/icon_name.rs"
