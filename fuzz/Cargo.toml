test = false
doc = false
bench = false

[[bin]]
name = "download_manager_state"
path = "fuzz_targets/download_manager_state.rs"
test = false
doc = false
bench = false

[[bin]]
name = "download_partial_metadata"
path = "fuzz_targets/download_partial_metadata.rs"
test = false
doc = false
bench = false

[[bin]]
name = "download_resume_decision"
path = "fuzz_targets/download_resume_decision.rs"
test = false
doc = false
bench = false

