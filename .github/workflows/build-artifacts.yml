name: Main Build Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: mado-macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            binary: mado
          - artifact: mado-macos-amd64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: mado
          - artifact: mado-windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: mado.exe
          - artifact: mado-linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: mado

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libasound2-dev \
            libfontconfig1-dev \
            libssl-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo data
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build mado
        run: cargo build --package mado --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
