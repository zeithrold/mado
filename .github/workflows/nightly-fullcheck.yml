name: Nightly Fullcheck

on:
  schedule:
    # Daily at 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-fullcheck-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fullcheck:
    name: just check-full
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libasound2-dev \
            libfontconfig1-dev \
            libssl-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install nightly Rust
        run: rustup toolchain install nightly --profile minimal --target x86_64-unknown-linux-gnu

      - name: Cache cargo data
        uses: Swatinem/rust-cache@v2

      - name: Install quality tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-deny,cargo-audit,cargo-machete,cargo-llvm-cov,cargo-mutants,cargo-udeps

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run nightly fullcheck
        run: just check-full
